name: CI/CD Pipeline for Airflow ETL

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install apache-airflow pandas pymysql
    
    - name: Check Python syntax
      run: |
        python -m py_compile dags/etl_pipelines/*.py
    
    - name: Verify Airflow import
      run: |
        python -c "from airflow import DAG; print('✅ Airflow imported successfully')"
